<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#3b4fd8"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf0ff"/>
    </linearGradient>
    <linearGradient id="store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f57e0"/>
      <stop offset="1" stop-color="#3344c4"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#101a52" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Location ripples (subtle) -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.10">
    <circle cx="600" cy="520" r="300" stroke-width="14"/>
    <circle cx="600" cy="520" r="430" stroke-width="12"/>
    <circle cx="600" cy="520" r="560" stroke-width="10"/>
  </g>

  <!-- Location pin -->
  <g filter="url(#ds)">
    <path d="M600 235
             C 438 235, 305 368, 305 530
             C 305 700, 468 852, 585 968
             C 594 977, 606 977, 615 968
             C 732 852, 895 700, 895 530
             C 895 368, 762 235, 600 235 Z"
          fill="url(#pin)"/>
  </g>

  <!-- Storefront glyph inside the pin head -->
  <g>
    <!-- awning bar -->
    <rect x="497" y="452" width="206" height="30" rx="8" fill="url(#store)"/>
    <!-- scalloped awning -->
    <path d="M497 482
             q 20.6 34 41.2 0 q 20.6 34 41.2 0 q 20.6 34 41.2 0 q 20.6 34 41.2 0 q 20.6 34 41.2 0
             z" fill="url(#store)"/>
    <!-- store body -->
    <rect x="512" y="512" width="176" height="118" rx="12" fill="url(#store)"/>
    <!-- door -->
    <path d="M566 630 v-52 a34 34 0 0 1 68 0 v52 z" fill="#ffffff"/>
    <!-- door knob -->
    <circle cx="622" cy="600" r="5.5" fill="url(#store)"/>
    <!-- windows -->
    <rect x="528" y="556" width="26" height="26" rx="5" fill="#ffffff" opacity="0.9"/>
    <rect x="646" y="556" width="26" height="26" rx="5" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
