name = "simple-store-locator"
account_id = "a3749936404ad833278d480205927750"
main = "./build/worker/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./build/client", binding = "ASSETS" }

[vars]
# Public/non-secret vars only. Secrets → `wrangler secret put`.
SHOPIFY_APP_URL = "https://simple-store-locator.fareedanish1.workers.dev"
SCOPES = ""
SHOPIFY_API_VERSION = "2026-04"
# Live stores get real charges; Shopify dev stores force test charges regardless.
APP_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "simple-store-locator"
database_id = "REPLACE_WITH_D1_ID"
migrations_dir = "./drizzle/migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "simple-store-locator-uploads"

[[queues.producers]]
binding = "IMPORT_QUEUE"
queue = "simple-store-locator-imports"

[[queues.consumers]]
queue = "simple-store-locator-imports"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "simple-store-locator-imports-dlq"

[observability]
enabled = true

# Per-env overrides
[env.staging]
name = "simple-store-locator-staging"
vars = { APP_ENV = "staging" }

[env.production]
name = "simple-store-locator-production"
vars = { APP_ENV = "production" }
