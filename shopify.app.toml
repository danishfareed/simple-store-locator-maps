# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "simple store locator"
handle = "simple-store-locator"
application_url = "https://storelocator.vdesignu.com"
embedded = true
client_id = "817cac4e2f1d3f929fb87ef43571d6e9"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = false

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = ""

[auth]
redirect_urls = [
  "https://storelocator.vdesignu.com/auth/callback",
  "https://storelocator.vdesignu.com/auth/shopify/callback",
  "https://storelocator.vdesignu.com/api/auth/callback",
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app_subscriptions/update"
  topics = [ "app_subscriptions/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  topics = [ "shop/redact" ]

[app_proxy]
url = "https://storelocator.vdesignu.com/proxy"
subpath = "store-locator"
prefix = "apps"

[pos]
embedded = false
