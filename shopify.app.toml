# Shopify app config. Run `shopify app config link` to connect an app, then
# `shopify app config use`. Values below are defaults overwritten on link.
name = "simple-store-locator"
handle = "simple-store-locator"
application_url = "https://simple-store-locator.fareedanish1.workers.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
include_config_on_deploy = true

[access_scopes]
scopes = ""

[auth]
redirect_urls = [
  "https://simple-store-locator.fareedanish1.workers.dev/auth/callback",
  "https://simple-store-locator.fareedanish1.workers.dev/auth/shopify/callback",
  "https://simple-store-locator.fareedanish1.workers.dev/api/auth/callback",
]

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app_subscriptions/update"]
uri = "/webhooks/app_subscriptions/update"

[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/webhooks/shop/redact"

[app_proxy]
url = "https://simple-store-locator.fareedanish1.workers.dev/proxy"
subpath = "store-locator"
prefix = "apps"

[pos]
embedded = false
